# ═══════════════════════════════════════════════════════════════════════════════
#  AI Courtroom v2.0 — Docker Compose
#  Services: PostgreSQL 16  +  FastAPI backend
#  The Next.js frontend runs locally via `npm run dev`.
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: courtroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: courtroom
      POSTGRES_PASSWORD: courtroom_secret
      POSTGRES_DB: courtroom
    ports:
      - "5432:5432"
    volumes:
      - courtroom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtroom -d courtroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtroom-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://courtroom:courtroom_secret@postgres:5432/courtroom
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  courtroom_pgdata:
